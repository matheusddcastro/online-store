<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dubray Books</title>
    
    <style>
    	.container {
    		background-color: #F5F1E8;
	        border: 1px solid #000;
	        border-radius: 15px;
	        box-shadow: 5px 5px 15px 5px #000000;
	        margin: auto 250px;
	        height: 500px;
	        max-height: 700px;
    	}
    
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #F2EFEA;
        }
        
        h1 {
            color: #1F4D3A;
            font-size: 40px;
        }
        
        h2 {
        	color: #333;
        	margin: auto 100px;
        }
        
        .button-container {
            margin-top: 20px;
        }
        
        button {
	        background-color: #1F4D3A;
	        border: 1px solid black;
	        border-radius: 10px;
	        color: #ffff;
	        padding: 10px 20px;
	        margin: 10px;
	        font-size: 16px;
    	}
    	
    	button:hover {
	        background-color: #2F6A52;
	        cursor: pointer;
	        transform: translateY(-2px);
    	}
        
        img {
        	width:  200px;
        	height: 200px;
        	margin-top: 25px;
        }
    </style>
    
</head>
<body>
	<div class="container">
		<div class="title-container">
        	<img src=books.png alt="Book Icon">
    	</div>
    	<h1>Welcome to Dubray Books</h1>
    	<br></br>
    	<h2>Browse our collection of books and discover your next great read. Please register or log in to continue.</h2>
    
    	<div class="button-container">
        	<button onclick="location.href='login.html'">Login</button>
        	<button onclick="location.href='registration.html'">Registration</button>
    	</div>
	</div>

</body>
</html>
